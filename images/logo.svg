<svg width="350" height="70" viewBox="0 0 350 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Tech circuit background -->
  <rect x="5" y="5" width="340" height="60" rx="25" ry="25" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>
  
  <!-- Twin light beams -->
  <polygon points="30,35 50,25 50,45" fill="url(#grad2)" opacity="0.7"/>
  <polygon points="320,35 300,25 300,45" fill="url(#grad2)" opacity="0.7"/>
  
  <!-- Circuit lines -->
  <path d="M50 35 Q100 20 150 35 T250 35 Q300 50 320 35" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Text with glow -->
  <text x="175" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="url(#grad1)" filter="url(#glow)">TWINSLIGHT</text>
  <text x="175" y="45" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#333">TECH</text>
  
  <!-- Small tech icons -->
  <circle cx="60" cy="20" r="3" fill="url(#grad2)"/>
  <circle cx="290" cy="50" r="3" fill="url(#grad2)"/>
  <rect x="55" y="15" width="10" height="10" fill="none" stroke="url(#grad1)" stroke-width="1"/>
  <rect x="285" y="45" width="10" height="10" fill="none" stroke="url(#grad1)" stroke-width="1"/>
</svg>